name: Deploy

on:
  push:
    branches: [ main ]

# Required for requesting the OIDC JWT used to assume the AWS deploy role.
permissions:
  id-token: write
  contents: read

# Avoid concurrent deploys stepping on each other.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Docker is preinstalled on ubuntu-latest runners and is needed because
      # the Rails image is built locally by ContainerImage.fromAsset during deploy.
      - name: Deploy CDK stack
        run: npx cdk deploy --require-approval never
